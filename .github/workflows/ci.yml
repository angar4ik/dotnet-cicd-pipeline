# GitHub Actions — CI pipeline (build + test + quality gate)
# Lesson: docs/04-github-actions-ci.md

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION: ReleasePipeline.sln
  POSTGRES_USER: app
  POSTGRES_PASSWORD: app
  POSTGRES_DB: release_pipeline_test
  ConnectionStrings__Default: Host=localhost;Port=5432;Database=release_pipeline_test;Username=app;Password=app

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: release_pipeline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d release_pipeline_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore /p:GitSha=${{ github.sha }}

      - name: Test with coverage gate
        env:
          ConnectionStrings__Default: ${{ env.ConnectionStrings__Default }}
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  # Quality gate: tests must pass before any deploy workflow runs on this commit.
  # In a real org, you might add SonarQube, dependency scanning, or approval gates here.

  e2e-ui:
    name: E2E (Playwright)
    needs: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5080
      BASE_URL: http://localhost:5080

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Angular UI
        run: |
          cd src/ReleasePipeline.UI
          npm ci
          npm run build

      - name: Copy UI to API wwwroot
        run: mkdir -p src/ReleasePipeline.Api/wwwroot && cp -r src/ReleasePipeline.UI/dist/browser/* src/ReleasePipeline.Api/wwwroot/

      - name: Build .NET API
        run: dotnet build ${{ env.SOLUTION }} --configuration Release /p:UseAppHost=false /p:GitSha=${{ github.sha }}

      - name: Start API
        run: |
          dotnet run --project src/ReleasePipeline.Api --configuration Release --no-build &
          echo $! > api.pid
          # Wait for the API to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5080/health > /dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            sleep 1
          done

      - name: Install Playwright
        run: |
          cd tests/ReleasePipeline.UI.E2E
          npm ci
          npx playwright install chromium --with-deps

      - name: Run Playwright tests
        run: cd tests/ReleasePipeline.UI.E2E && npx playwright test

      - name: Stop API
        if: always()
        run: kill $(cat api.pid) 2>/dev/null || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: tests/ReleasePipeline.UI.E2E/playwright-report/
          retention-days: 7
