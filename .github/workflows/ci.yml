# GitHub Actions — CI pipeline (build + test + quality gate)
# Lesson: docs/04-github-actions-ci.md

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION: ReleasePipeline.sln
  POSTGRES_USER: app
  POSTGRES_PASSWORD: app
  POSTGRES_DB: release_pipeline_test
  ConnectionStrings__Default: Host=localhost;Port=5432;Database=release_pipeline_test;Username=app;Password=app

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: release_pipeline_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app -d release_pipeline_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore /p:GitSha=${{ github.sha }}

      - name: Test with coverage gate
        env:
          ConnectionStrings__Default: ${{ env.ConnectionStrings__Default }}
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  # Quality gate: tests must pass before any deploy workflow runs on this commit.
  # In a real org, you might add SonarQube, dependency scanning, or approval gates here.
  # E2E (Playwright) tests run as a separate workflow: .github/workflows/e2e.yml
