# GitHub Actions — CI pipeline (build + test + quality gate)
# Lesson: docs/04-github-actions-ci.md

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION: ReleasePipeline.sln

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --configuration Release --no-restore /p:GitSha=${{ github.sha }}

      - name: Test with coverage gate
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --configuration Release \
            --no-build \
            --verbosity normal \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  # Quality gate: tests must pass before any deploy workflow runs on this commit.
  # In a real org, you might add SonarQube, dependency scanning, or approval gates here.
