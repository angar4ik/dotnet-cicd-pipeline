# GitHub Actions — CD pipeline (Docker build/push + deploy)
# Lesson: docs/05-github-actions-cd.md and docs/06-deployment.md

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target"
        required: true
        default: simulated
        type: choice
        options:
          - simulated
          - azure

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "8.0.x"
  IMAGE_NAME: release-pipeline-api

jobs:
  build-and-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}

  deploy-simulated:
    name: Deploy (Simulated)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.deploy_target == 'simulated'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Simulate deployment
        run: |
          mkdir -p deploy-artifacts
          cat > deploy-artifacts/deployment-manifest.json <<EOF
          {
            "service": "release-pipeline-api",
            "environment": "staging",
            "image": "ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}",
            "git_sha": "${{ github.sha }}",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "deployed_by": "${{ github.actor }}",
            "status": "success"
          }
          EOF
          echo "=== Simulated deploy complete ==="
          cat deploy-artifacts/deployment-manifest.json

      - name: Upload deployment manifest
        uses: actions/upload-artifact@v6
        with:
          name: deployment-manifest
          path: deploy-artifacts/deployment-manifest.json
          retention-days: 30

      - name: Post-deploy smoke check (simulated)
        run: |
          echo "In production, this step would curl https://your-app.azurewebsites.net/health"
          echo "Smoke check: PASS (simulated)"

  smoke-prod:
    name: Prod Smoke Tests
    needs: deploy-simulated
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder — real prod tests go here
        run: |
          echo "=== Production smoke tests (placeholder) ==="
          echo "This is where you'd run tests against the real deployed environment:"
          echo "  - Playwright tests targeting the production URL"
          echo "  - API contract tests against live endpoints"
          echo "  - Synthetic monitoring checks (health, latency, critical flows)"
          echo ""
          echo "Setup needed:"
          echo "  1. Deploy the app to a real environment (Azure, k8s, etc.)"
          echo "  2. Set PROD_URL secret in GitHub → repo Settings → Secrets"
          echo "  3. Replace this placeholder with actual test commands"
          echo ""
          echo "Example:"
          echo "  curl -f \$PROD_URL/health"
          echo "  cd tests/ReleasePipeline.UI.E2E && BASE_URL=\$PROD_URL npx playwright test"
          echo ""
          echo "Smoke check: SKIPPED (placeholder)"

  deploy-azure:
    name: Deploy (Azure App Service)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_target == 'azure'
    environment: production

    steps:
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Smoke test
        run: |
          echo "Configure AZURE_WEBAPP_URL secret and uncomment curl below for real smoke tests."
          # curl -f "${{ secrets.AZURE_WEBAPP_URL }}/health"
